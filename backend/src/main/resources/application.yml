server:
  port: 8000
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: zhuoyue-platform
  profiles:
    active: local
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5433}/${DB_NAME:zhuoyue_platform}
    username: ${DB_USERNAME:cjs}
    password: ${DB_PASSWORD:zx4221335}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:zx4221335}
      database: ${REDIS_DATABASE:0}
      timeout: 5s
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  sql:
    init:
      mode: always
      encoding: UTF-8

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id

logging:
  level:
    com.zhuoyue.platform: INFO
